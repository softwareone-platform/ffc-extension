name: PR build and merge

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
      - release/*

permissions:
  contents: read

jobs:
  validate-backend:
    services:
      db:
        image: postgres:17
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: mysecurepass#
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install uv and set up its cache
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "backend/.python-version"

      - name: Install the project dependancies
        run: uv --project backend sync --all-extras --dev

      - name: Create the .env file
        run: cp env.example .env

      - name: Run formatting checks
        run: uv --project backend run ruff format --check --diff backend

      - name: Run linting
        run: uv --project backend run ruff check backend

      - name: Run tests
        run: uv --project backend run pytest --rootdir=backend -c backend/pyproject.toml backend
        env:
          FFC_EXT_POSTGRES_HOST: localhost
          FFC_EXT_POSTGRES_PORT: 5432
          FFC_EXT_POSTGRES_USER: postgres
          FFC_EXT_POSTGRES_PASSWORD: mysecurepass#

      - name: Compute added/removed lines for notification
        if: ${{ github.event_name == 'pull_request' }}
        id: diff
        run: |
          PR_DATA=$(gh pr view "${{ github.event.pull_request.number }}" --json additions,deletions -q '.')
          ADDITIONS=$(echo "$PR_DATA" | jq '.additions')
          DELETIONS=$(echo "$PR_DATA" | jq '.deletions')
          echo "additions=$ADDITIONS" >> $GITHUB_OUTPUT
          echo "deletions=$DELETIONS" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload backend coverage
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: coverage.xml


  validate-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Setup Node.js 24
      uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: npm
        cache-dependency-path: frontend/package-lock.json
    - name: Configure npm authentication
      run: |
        cat <<EOF > ~/.npmrc
        //softwareone-pc.pkgs.visualstudio.com/_packaging/PyraCloud/npm/registry/:username=github
        //softwareone-pc.pkgs.visualstudio.com/_packaging/PyraCloud/npm/registry/:_password="${NPM_TOKEN_BASE64}"
        //softwareone-pc.pkgs.visualstudio.com/_packaging/PyraCloud/npm/registry/:email=github@softwareone.com
        //softwareone-pc.pkgs.visualstudio.com/_packaging/PyraCloud/npm/:username=github
        //softwareone-pc.pkgs.visualstudio.com/_packaging/PyraCloud/npm/:_password="${NPM_TOKEN_BASE64}"
        //softwareone-pc.pkgs.visualstudio.com/_packaging/PyraCloud/npm/:email=github@softwareone.com
        EOF
      env:
        NPM_TOKEN_BASE64: ${{ secrets.AZURE_DEVOPS_NPM_TOKEN_BASE64 }}
    - name: Install dependencies
      run: cd frontend && npm ci
    - name: Run Unit Tests with Coverage
      run: cd frontend && npm run test:coverage
    - name: Build and validate frontend
      run: cd frontend && npm run check:all
    - name: Upload frontend coverage
      uses: actions/upload-artifact@v7
      with:
        name: frontend-coverage
        path: lcov.info

  teams:
    needs: [validate-backend, validate-frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Notify Microsoft Teams
        if: ${{ github.event_name == 'pull_request' }}
        uses: softwareone-platform/notify-pr-teams-action@v4
        with:
          webhook_url: ${{ secrets.TEAMS_WEBHOOK_URL }}
          bot_image_url: https://raw.githubusercontent.com/softwareone-platform/ffc-extension/main/.github/workflows/assets/turing_team_pr_bot.png
          repo: ${{ github.repository }}
          pr_url: ${{ github.event.pull_request.html_url }}
          pr_title: ${{ github.event.pull_request.title }}
          pr_author: ${{ github.event.pull_request.user.login }}
          head_ref: ${{ github.event.pull_request.head.ref }}
          base_ref: ${{ github.event.pull_request.base.ref }}
          commits: ${{ github.event.pull_request.commits }}
          changed_files: ${{ github.event.pull_request.changed_files }}
          additions: ${{ steps.diff.outputs.additions }}
          deletions: ${{ steps.diff.outputs.deletions }}
          pr_number: ${{ github.event.pull_request.number }}
          pr_status: ${{ github.event.pull_request.state }}
          is_merged: ${{ github.event.pull_request.merged }}

  quality-check:
    needs: [validate-backend, validate-frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download frontend coverage
        uses: actions/download-artifact@v8
        with:
          name: frontend-coverage

      - name: Download backend coverage
        uses: actions/download-artifact@v8
        with:
          name: backend-coverage

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarQube Quality Gate check
        id: sonarqube-quality-gate-check
        uses: sonarsource/sonarqube-quality-gate-action@master
        with:
          pollingTimeoutSec: 600
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
