default_language_version:
    python: python3.12
repos:
    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v5.0.0
      hooks:
          - id: check-added-large-files
          - id: check-toml
          - id: check-yaml
            args:
                - --unsafe
          - id: end-of-file-fixer
          - id: trailing-whitespace
          - id: check-json
          - id: check-merge-conflict
    - repo: https://github.com/astral-sh/ruff-pre-commit
      rev: v0.10.0
      hooks:
          - id: ruff
            args:
                - --config
                - backend/pyproject.toml
                - --fix
          - id: ruff-format
    - repo: https://github.com/gitleaks/gitleaks
      rev: v8.30.1
      hooks:
          - id: gitleaks
    - repo: local
      hooks:
          - id: frontend-check
            name: frontend check:all
            language: system
            entry: bash -c 'cd frontend && exec npm run --silent check:all'
            files: ^frontend/.*\.(ts|tsx|js|mjs|cjs|json|scss|md)$
            pass_filenames: false
            require_serial: true
